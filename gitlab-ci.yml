# GitLab CI/CD Pipeline for psrd-web
# Triggers automatically on every push to the main branch.
# Builds the static site and deploys to Cloudflare Pages.

image: node:20-alpine

variables:
  # Set these in GitLab: Settings → CI/CD → Variables
  # CF_API_TOKEN   — Cloudflare API token (masked, protected)
  # CF_ACCOUNT_ID  — Cloudflare account ID (visible in CF dashboard URL)
  WRANGLER: "npx wrangler@3"

stages:
  - build
  - deploy

build:
  stage: build
  script:
    # Create dist/ structure
    - mkdir -p dist/assets
    # Copy committed Vite bundles into dist/
    - cp -r assets/. dist/assets/
    # Copy template.html — CF Pages Function reads this at runtime
    - cp template.html dist/template.html
    # Copy public/ files (_redirects, _headers) into dist/
    - cp -r public/. dist/
    # Generate all static HTML pages, sitemap, robots, 404
    - node generate-ssg.mjs
  artifacts:
    # Pass dist/ to the deploy stage
    paths:
      - dist/
    expire_in: 1 hour
  only:
    - main

deploy:
  stage: deploy
  dependencies:
    - build
  script:
    # Deploy dist/ to Cloudflare Pages.
    # Wrangler automatically picks up functions/ from the repo root.
    # --commit-dirty=true allows deploy even if git working tree is not clean.
    - $WRANGLER pages deploy dist
        --project-name=psrd-web
        --commit-dirty=true
  environment:
    name: production
    url: https://powersteeringrackdirect.com
  only:
    - main